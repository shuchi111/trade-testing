name: ML signals

on:
  schedule:
    # Weekdays 7:00 AM IST (1:30 AM UTC) → Swing DB
    - cron: '30 1 * * 1-5'
  workflow_dispatch:
    inputs:
      trade_date:
        description: YYYY-MM-DD (empty = UTC today)
        required: false
        type: string
      skip_execute:
        description: Score only (skip paper execute)
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: '1'

jobs:
  ml-desk:
    name: Score + execute (Swing ML wallet)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: ml-signals-swing-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify SWING DB secrets
        run: |
          if [ -z "$SWING_DATABASE_URL" ]; then
            echo '::error::SWING_DATABASE_URL required'
            exit 1
          fi
        env:
          SWING_DATABASE_URL: ${{ secrets.SWING_DATABASE_URL }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent-swing/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-swing/requirements.txt

      - name: ML score + paper execute
        env:
          DATABASE_URL: ${{ secrets.SWING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.SWING_DIRECT_URL }}
          TRADE_DATE_INPUT: ${{ github.event.inputs.trade_date || '' }}
          SKIP_EXECUTE: ${{ github.event.inputs.skip_execute || 'false' }}
          PYTHONPATH: agent-swing
        working-directory: ${{ github.workspace }}
        run: |
          set -uo pipefail
          if [ -n "$TRADE_DATE_INPUT" ]; then
            DATE="$TRADE_DATE_INPUT"
          else
            # Prefer last weekday so weekend/manual runs don't mark signals stale
            DATE="$(python - <<'PY'
from datetime import date, timedelta
d = date.today()
while d.weekday() >= 5:  # Sat/Sun → walk back to Friday
    d -= timedelta(days=1)
print(d.isoformat())
PY
)"
          fi
          echo "Swing DB | ML score | trade_date=$DATE"
          cd agent-swing
          python -m backtest.ml_score --universe --source cron --json
          if [ "$SKIP_EXECUTE" = "true" ]; then
            echo "Skip execute requested"
            exit 0
          fi
          echo "ML paper execute → wallet …0003"
          python execute_ml_trades.py --all --execute --trade-date "$DATE"
