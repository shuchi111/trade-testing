
version: 2.1

parameters:
  mode:
    description: batch = all 22 tickers | price_refresh = stale rows | both
    type: enum
    enum: ["batch", "price_refresh", "both"]
    default: batch
  tickers_override:
    description: Optional comma-separated tickers (smoke test only). Empty = RECOMMENDATION_TICKERS (22).
    type: string
    default: ""
  trade_date:
    description: Optional YYYY-MM-DD override. Empty = today IST (Sat/Sun → Friday).
    type: string
    default: ""

commands:
  verify-secrets:
    steps:
      - run:
          name: Verify secrets
          command: bash scripts/verify-secrets.sh

  install-agent-deps:
    steps:
      - run:
          name: Install agent dependencies
          command: bash scripts/install-deps.sh

  export-pipeline-env:
    steps:
      - run:
          name: Export pipeline parameters
          command: |
            set -euo pipefail
            {
              echo "export PIPELINE_MODE='<< pipeline.parameters.mode >>'"
              echo "export TICKERS_OVERRIDE='<< pipeline.parameters.tickers_override >>'"
              echo "export TRADE_DATE_INPUT='<< pipeline.parameters.trade_date >>'"
              echo "export REPO_ROOT='${PWD}'"
            } >> "$BASH_ENV"

  resolve-market-date:
    steps:
      - run:
          name: Resolve market trade date (IST)
          command: |
            set -euo pipefail
            source scripts/market-date.sh
            echo "Current time (IST): $(ist_now)"
            if [ -z "${TRADE_DATE_INPUT:-}" ]; then
              echo "Trade date (auto): $(market_trade_date) (IST, NSE weekday)"
            else
              echo "Trade date (override): ${TRADE_DATE_INPUT}"
            fi

jobs:
  batch-shard:
    parameters:
      shard_index:
        type: integer
      shard_total:
        type: integer
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    working_directory: ~/project
    environment:
      PYTHONUNBUFFERED: "1"
      TICKER_SHARD_INDEX: << parameters.shard_index >>
      TICKER_SHARD_TOTAL: << parameters.shard_total >>
      LLM_PROVIDER: "glm"
      DEEP_THINK_LLM: "glm-5.2"
      QUICK_THINK_LLM: "glm-5.2"
      LLM_BACKEND_URL: "https://api.z.ai/api/paas/v4/"
    steps:
      - checkout
      - export-pipeline-env
      - resolve-market-date
      - verify-secrets
      - install-agent-deps
      - run:
          name: Run batch shard (recommendations only)
          no_output_timeout: 55m
          command: |
            set -euo pipefail
            case "${PIPELINE_MODE}" in
              batch|both)
                bash scripts/run-batch.sh
                ;;
              price_refresh)
                echo "Skipping batch (mode=${PIPELINE_MODE})"
                ;;
              *)
                echo "Unknown PIPELINE_MODE=${PIPELINE_MODE}"
                exit 1
                ;;
            esac

  execute-ai-trades:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    working_directory: ~/project
    environment:
      PYTHONUNBUFFERED: "1"
      PRICE_REFRESH_RATIO: "0.03"
      MAX_CACHE_AGE_DAYS: "10"
      SELL_TRANSACTION_CHARGE_INR: "150"
    steps:
      - checkout
      - export-pipeline-env
      - resolve-market-date
      - verify-secrets
      - install-agent-deps
      - run:
          name: Execute paper trades (all tickers)
          no_output_timeout: 30m
          command: |
            set -euo pipefail
            case "${PIPELINE_MODE}" in
              batch|both)
                bash scripts/run-execute.sh
                ;;
              price_refresh)
                echo "Skipping execute (mode=${PIPELINE_MODE})"
                ;;
              *)
                exit 1
                ;;
            esac
      - run:
          name: Run price refresh (stale cache)
          no_output_timeout: 60m
          command: |
            set -euo pipefail
            case "${PIPELINE_MODE}" in
              price_refresh|both)
                bash scripts/run-price-refresh.sh
                ;;
              *)
                echo "Skipping price refresh (mode=${PIPELINE_MODE})"
                ;;
            esac

workflows:
  # Cron only (10:30 IST Mon–Fri = 05:00 UTC). Does NOT run on git push.
  scheduled-ai-recommendations:
    when:
      or:
        - equal: [schedule, << pipeline.trigger_source >>]
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    triggers:
      - schedule:
          cron: "0 5 * * 1-5"
          filters:
            branches:
              only: main
    jobs:
      - batch-shard:
          name: batch-shard-0
          shard_index: 0
          shard_total: 5
      - batch-shard:
          name: batch-shard-1
          shard_index: 1
          shard_total: 5
      - batch-shard:
          name: batch-shard-2
          shard_index: 2
          shard_total: 5
      - batch-shard:
          name: batch-shard-3
          shard_index: 3
          shard_total: 5
      - batch-shard:
          name: batch-shard-4
          shard_index: 4
          shard_total: 5
      - execute-ai-trades:
          requires:
            [batch-shard-0, batch-shard-1, batch-shard-2, batch-shard-3, batch-shard-4]

  # "Trigger Pipeline" in CircleCI UI only. Does NOT run on git push.
  manual-ai-recommendations:
    when:
      equal: [api, << pipeline.trigger_source >>]
    jobs:
      - batch-shard:
          name: batch-shard-0
          shard_index: 0
          shard_total: 5
          filters:
            branches:
              only: main
      - batch-shard:
          name: batch-shard-1
          shard_index: 1
          shard_total: 5
          filters:
            branches:
              only: main
      - batch-shard:
          name: batch-shard-2
          shard_index: 2
          shard_total: 5
          filters:
            branches:
              only: main
      - batch-shard:
          name: batch-shard-3
          shard_index: 3
          shard_total: 5
          filters:
            branches:
              only: main
      - batch-shard:
          name: batch-shard-4
          shard_index: 4
          shard_total: 5
          filters:
            branches:
              only: main
      - execute-ai-trades:
          requires:
            [batch-shard-0, batch-shard-1, batch-shard-2, batch-shard-3, batch-shard-4]
          filters:
            branches:
              only: main
